<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#100b00" />
    <meta name="description" content="RoastMyResume — get your resume brutally roasted by AI, with a 5-category ATS score, specific fixes, and a JD matcher. Free, no signup, built for CS freshers." />
    <meta name="keywords" content="resume roast, ATS score, job description matcher, resume feedback, fresher resume, AI resume review" />
    <meta property="og:title" content="RoastMyResume 🔥 — AI Resume Roaster & ATS Scorer" />
    <meta property="og:description" content="Upload your resume. Get brutally honest feedback, a category breakdown, and specific fixes. No sugarcoating." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "RoastMyResume",
      "description": "AI-powered resume analysis, roasting, ATS scoring, and job description matching.",
      "applicationCategory": "Career"
    }
    </script>

    <!-- Set the theme before first paint to avoid a flash of the wrong mode -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("rmr_theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <!-- Critical inline style to prevent FOUC -->
    <style>
      html[data-theme="light"] body { background: #fdf6ec; color: #2a1c0a; }
      html[data-theme="dark"] body,
      html:not([data-theme]) body { background: #100b00; color: #fff5e0; }
      body { margin: 0; }
      #root { min-height: 100vh; }
    </style>

    <!-- Preconnect for fast font load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- All 3 fonts in one request -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1R0WW6KSXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1R0WW6KSXX');
    </script>

    <!-- Google AdSense -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9374418399191974"
      crossorigin="anonymous"
    ></script>

    <title>Roast My Resume 🔥 | macoostudy.info</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
